name: Release & Push to GHCR

# GitHub Release を publish したときに発火し、GHCR にマルチアーキ image を push する。
# raspi5 (arm64) 上の k3s が pull する想定。
# 手動実行（workflow_dispatch）にも対応。version 入力でタグを指定可能。

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: '手動実行時の image タグ（例: v1.2.3 / hotfix-20260601）。未指定なら github.sha を使用。'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push to GHCR
    # ネイティブ arm64 ランナーで build
    # raspi5 (arm64) でしか動かさないため arm64 only。
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Determine version metadata
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${GITHUB_REF_NAME}"
            BUILD_DATE=$(TZ=Asia/Tokyo date -d "${{ github.event.release.published_at }}" '+%Y.%m.%d')
          elif [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
            BUILD_DATE=$(TZ=Asia/Tokyo date '+%Y.%m.%d')
          else
            TAG="${GITHUB_SHA::7}"
            BUILD_DATE=$(TZ=Asia/Tokyo date '+%Y.%m.%d')
          fi
          echo "version=${TAG}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT
          echo "Tag: ${TAG}"
          echo "Build Date: ${BUILD_DATE}"

      - uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/ServerlessKakeibo.Api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/backend:latest
            ghcr.io/${{ steps.repo.outputs.name }}/backend:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:latest
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:${{ steps.version.outputs.version }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
            VITE_GITHUB_CLIENT_ID=${{ vars.VITE_GITHUB_CLIENT_ID }}
            VITE_ENVIRONMENT=production
            VITE_APP_VERSION=${{ steps.version.outputs.version }}
            VITE_BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Images pushed to GHCR (linux/arm64)"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Backend:  ghcr.io/${{ steps.repo.outputs.name }}/backend:${{ steps.version.outputs.version }}"
          echo "Frontend: ghcr.io/${{ steps.repo.outputs.name }}/frontend:${{ steps.version.outputs.version }}"
