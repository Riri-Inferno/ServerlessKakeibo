name: Deploy to GitHub Pages (Demo)

on:
  workflow_dispatch: # 手動トリガー
  push:
    branches:
      - main
    paths:
      - "Frontend/**"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Generate mock data
        working-directory: Frontend
        run: npm run generate-mock

      - name: Build for Demo
        working-directory: Frontend
        env:
          # デモ環境用の環境変数
          VITE_API_BASE_URL: ${{ vars.DEMO_API_BASE_URL || 'https://demo-api.your-domain.com' }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.DEMO_GOOGLE_CLIENT_ID }}
          VITE_GITHUB_CLIENT_ID: ${{ vars.DEMO_GITHUB_CLIENT_ID }}
          VITE_ENVIRONMENT: demo
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "✅ Demo deployed to GitHub Pages"
          echo ""
          echo "🔗 URL: ${{ steps.deployment.outputs.page_url }}"
