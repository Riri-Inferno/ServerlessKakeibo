name: Deploy to GitHub Pages (Demo)

on:
  workflow_dispatch: # 手動トリガー
  push:
    branches:
      - main
    paths:
      - "Frontend/**"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Determine frontend metadata
        run: |
          echo "VITE_APP_VERSION=demo-${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "VITE_BUILD_DATE=$(TZ=Asia/Tokyo date '+%Y.%m.%d')" >> $GITHUB_ENV

      - name: Build for Demo
        working-directory: Frontend
        env:
          # ベースパスを設定（リポジトリ名）
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_BASE_URL: ${{ vars.DEMO_API_BASE_URL || 'https://demo-api.your-domain.com' }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.DEMO_GOOGLE_CLIENT_ID }}
          VITE_GITHUB_CLIENT_ID: ${{ vars.DEMO_GITHUB_CLIENT_ID }}
          VITE_ENVIRONMENT: demo
          VITE_APP_VERSION: ${{ env.VITE_APP_VERSION }}
          VITE_BUILD_DATE: ${{ env.VITE_BUILD_DATE }}
        run: npm run build -- --base=/ServerlessKakeibo/ # 一旦直指定

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "✅ Demo deployed to GitHub Pages"
          echo ""
          echo "🔗 URL: ${{ steps.deployment.outputs.page_url }}"
