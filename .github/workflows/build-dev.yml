name: Build Dev (GHCR)

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    # ネイティブ arm64 ランナーで build（QEMU 不要）。
    # raspi5 (arm64) でしか動かさないため arm64 only としている。
    # amd64 image が必要になったら別ワークフローとして追加する
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/ServerlessKakeibo.Api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/backend:dev
            ghcr.io/${{ steps.repo.outputs.name }}/backend:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:dev
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:dev-${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
            VITE_GITHUB_CLIENT_ID=${{ vars.VITE_GITHUB_CLIENT_ID }}
            VITE_ENVIRONMENT=development
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "✅ Dev images pushed to GHCR"
          echo "Backend:  ghcr.io/${{ steps.repo.outputs.name }}/backend:dev-${{ github.sha }}"
          echo "Frontend: ghcr.io/${{ steps.repo.outputs.name }}/frontend:dev-${{ github.sha }}"
