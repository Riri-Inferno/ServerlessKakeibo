name: Build Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'Backend/**'
      - 'Frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/**'

jobs:
  build-backend:
    name: Backend Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/ServerlessKakeibo.Api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-compose:
    name: Docker Compose Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Backend/.envを作成
      - name: Create Backend .env file
        run: |
          cat > Backend/.env << 'EOF'
          # CI用のダミー環境変数
          ASPNETCORE_ENVIRONMENT=Development
          ASPNETCORE_URLS=http://+:8080
          ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=appdb;Username=postgres;Password=Password
          VertexAi__ProjectId=dummy-project-id
          GcpStorage__BucketName=dummy-bucket
          GcpStorage__ProjectId=dummy-project-id
          Authentication__Jwt__SecretKey=dummy-secret-key-for-ci-testing-min-32-chars
          Authentication__Google__ClientId=dummy-google-client-id
          Authentication__GitHub__ClientId=dummy-github-client-id
          Authentication__GitHub__ClientSecret=dummy-github-secret
          GoogleAiStudio__ApiKey=dummy-api-key
          EOF
      
      # Frontend/.envを作成
      - name: Create Frontend .env file
        run: |
          cat > Frontend/.env << 'EOF'
          # CI用のダミー環境変数
          VITE_API_BASE_URL=http://localhost:8080
          VITE_GOOGLE_CLIENT_ID=dummy-google-client-id
          VITE_GITHUB_CLIENT_ID=dummy-github-client-id
          VITE_ENVIRONMENT=development
          VITE_APP_VERSION=1.0.0
          VITE_BUILD_DATE=2025-01-01
          EOF
      
      # service_account.jsonのダミーファイルを作成
      - name: Create dummy service_account.json
        run: |
          cat > Backend/ServerlessKakeibo.Api/service_account.json << 'EOF'
          {
            "type": "service_account",
            "project_id": "dummy-project",
            "private_key_id": "dummy-key-id",
            "private_key": "-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC\n-----END PRIVATE KEY-----\n",
            "client_email": "dummy@dummy-project.iam.gserviceaccount.com",
            "client_id": "123456789",
            "auth_uri": "https://accounts.google.com/o/oauth2/auth",
            "token_uri": "https://oauth2.googleapis.com/token",
            "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
            "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/dummy%40dummy-project.iam.gserviceaccount.com"
          }
          EOF
      
      - name: Validate docker-compose
        run: docker compose config
      
      # 実際に起動してヘルスチェック
      - name: Test docker-compose up
        run: |
          docker compose up -d
          sleep 10
          docker compose ps
          docker compose logs
          docker compose down
