services:
  # データベース
  db:
    image: postgres:16
    container_name: kakeibo-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kakeibo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # バックエンドAPI
  backend:
    build:
      context: ./Backend
      dockerfile: ServerlessKakeibo.Api/Dockerfile
    container_name: kakeibo-backend
    env_file:
      - ./Backend/.env
    ports:
      - "8080:8080"
    volumes:
      # gcloud ADC を read-only でマウント（GOOGLE_APPLICATION_CREDENTIALS が参照）
      - ${HOME}/.config/gcloud:/gcp/adc:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kakeibo-network

  # フロントエンド
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: kakeibo-frontend
    env_file:
      - ./Frontend/.env
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kakeibo-network

  # Cloudflare Tunnel（外部公開用）
  # ローカル動作確認では不要。外部公開（kakeibo.riri-inferno.com 経由のアクセス）を
  # この compose 上で試したい場合のみアンコメントし、ルートの .env に
  # CLOUDFLARE_TUNNEL_TOKEN を設定する。
  # 本番（k3s）では cloudflared は home-raspi-iac 側で別途管理する想定。
  # tunnel:
  #   image: cloudflare/cloudflared:latest
  #   container_name: cloudflare-tunnel
  #   restart: always
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  #   command: tunnel --no-autoupdate run
  #   networks:
  #     - kakeibo-network
  #   depends_on:
  #     - frontend

volumes:
  pgdata:

networks:
  kakeibo-network:
    driver: bridge
