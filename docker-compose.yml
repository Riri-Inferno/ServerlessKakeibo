services:
  # データベース
  db:
    image: postgres:16
    container_name: kakeibo-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kakeibo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # バックエンドAPI
  backend:
    build:
      context: ./Backend
      dockerfile: ServerlessKakeibo.Api/Dockerfile
    container_name: kakeibo-backend
    env_file:
      - ./Backend/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kakeibo-network
    volumes:
      - ./Backend/ServerlessKakeibo.Api/service_account.json:/app/service_account.json:ro

  # フロントエンド
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: kakeibo-frontend
    env_file:
      - ./Frontend/.env
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kakeibo-network

volumes:
  pgdata:

networks:
  kakeibo-network:
    driver: bridge
