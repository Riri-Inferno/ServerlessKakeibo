# docker-compose.prod.yml
# 本番用: GAR からイメージを pull して起動（ソース不要）
#
# 使い方:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# 環境変数は .env.prod から読み込まれる

services:
  db:
    image: postgres:16
    container_name: kakeibo-db
    env_file:
      - .env.prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kakeibo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${GAR_IMAGE_BASE}/backend:${IMAGE_TAG:-latest}
    container_name: kakeibo-backend
    env_file:
      - .env.prod
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kakeibo-network

  frontend:
    image: ${GAR_IMAGE_BASE}/frontend:${IMAGE_TAG:-latest}
    container_name: kakeibo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kakeibo-network

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: always
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - kakeibo-network
    depends_on:
      - frontend

volumes:
  pgdata:

networks:
  kakeibo-network:
    driver: bridge
